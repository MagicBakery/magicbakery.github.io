<!doctype html>
<html>

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no" />
  <title>Playground</title>
  <style>
    html,
    body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #222;
      color: #eee;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
      --card-radius: 6px;
      padding-bottom: 60px;
      cursor: pointer;
      /* Add this line to remove the blue flash */
      -webkit-tap-highlight-color: transparent;
      tap-highlight-color: transparent;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
      overscroll-behavior: none;
    }

    #hud-left {
      position: absolute;
      left: 10px;
      top: 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      pointer-events: none;
      max-width: 320px;
      width: 300px;
      z-index: 100;
    }

    #hud-right {
      position: absolute;
      right: 10px;
      top: 10px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 10px;
      pointer-events: none;
      z-index: 100;
    }

    #footerBar {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: auto;
      /* Adjust height as needed */
      display: flex;
      flex-direction: column;
      justify-content: space-evenly;
      /* Pushes items to opposite ends */
      align-items: center;
      padding: 0 15px;
      /* Adds space from the edges of the screen */
      background: rgba(30, 30, 30, 0.9);
      /* Semi-transparent dark background */
      border-top: 1px solid #444;
      box-sizing: border-box;
      z-index: 1000;
    }

    .footerBtnBar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-direction: row;
      width: 100%;
    }


    #footerBar .btn {
      background: none;
      border: none;
      color: #606060;
      height: 80%;

    }

    .panel {
      pointer-events: auto;
      background: rgba(0, 0, 0, .75);
      border: 1px solid rgba(255, 255, 255, .12);
      border-radius: 10px;
      backdrop-filter: blur(12px);
      box-shadow: 0 4px 25px rgba(0, 0, 0, 0.6);
      overflow: hidden;
      transition: width 0.2s ease, height 0.2s ease, border-radius 0.2s ease;
    }

    #setupPanel.collapsed {
      width: 50px;
      height: 50px;
      border-radius: 10px;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 50px;
      height: 50px;
      cursor: pointer;
      user-select: none;
      background: rgba(255, 255, 255, 0.02);
      box-sizing: border-box;
    }

    #setupPanel:not(.collapsed) .panel-header {
      width: 100%;
      justify-content: flex-start;
      padding-left: 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.04);
    }

    .panel-header:hover {
      background: rgba(255, 255, 255, 0.08);
    }

    .panel-content {
      padding: 14px;
      display: block;
    }

    #setupPanel.collapsed .panel-content {
      display: none;
    }

    .tab-bar {
      display: flex;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      margin-bottom: 12px;
      gap: 4px;
      justify-content: space-between;
      /* This pushes the two inner divs to opposite sides */
      align-items: center;
      /* Vertically centers them */
    }

    .tab-btn {
      background: transparent;
      border: none;
      color: rgba(255, 255, 255, 0.5);
      padding: 6px 10px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      border-radius: 6px 6px 0 0;
      transition: color 0.15s ease, background-color 0.15s ease;
    }

    .tab-btn:hover {
      color: #fff;
      background: rgba(255, 255, 255, 0.05);
    }

    .tab-btn.active {
      color: #1f6feb;
      border-bottom: 2px solid #1f6feb;
      border-radius: 0;
      background: transparent;
    }

    .tab-buttons {
      display: flex;
      gap: 4px;
    }

    .tab-pane {
      display: none;
    }

    .tab-pane.active {
      display: block;
    }

    .row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-top: 8px;
    }

    .row:first-child {
      margin-top: 0;
    }

    .version-display {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.4);
      font-family: monospace;
      padding-right: 4px;
    }

    input[type="text"] {
      background: #0d0d0d;
      color: #fff;
      border: 1px solid rgba(255, 255, 255, .18);
      border-radius: 8px;
      padding: 6px 8px;
      flex-grow: 1;
    }

    input[type="range"] {
      flex-grow: 1;
      accent-color: #1f6feb;
      cursor: pointer;
    }

    button.action-btn {
      background: #1f6feb;
      color: #fff;
      border: 0;
      border-radius: 8px;
      padding: 7px 12px;
      cursor: pointer;
      font-weight: 500;
    }

    button.action-btn:disabled {
      opacity: .5;
      cursor: not-allowed;
    }


    .icon-btn {
      border-radius: 50%;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: auto;
      transition: background-color 0.25s ease, border-color 0.25s ease, transform 0.1s ease;
      background-color: none;
    }

    .icon-btn:active {
      transform: scale(0.96);
    }

    #btnResync.auto {
      color: green;
      animation: blink-animation 5s ease-in-out infinite;
    }

    .icon-btn[data-status="normal"] {}

    .icon-btn[data-status="reload"] {
      color: green !important;
    }

    .icon-btn[data-status="pending"],
    .icon-btn[data-status="saving"] {
      color: gold !important;
    }

    .icon-btn[data-status="reload"] .icon,
    .icon-btn[data-status="saving"] .icon {
      animation: spin-ccw 5s linear infinite;
      transform-origin: center;
    }

    @keyframes spin-ccw {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(-360deg);
      }
    }

    .icon-btn[data-status="error"] {
      color: darkred !important;
    }

    .icon-btn[data-status="reload"],
    .icon-btn[data-status="pending"],
    .icon-btn[data-status="error"] {
      animation: blink-animation 3s ease-in-out infinite;
    }

    @keyframes blink-animation {
      0% {
        opacity: 1;
      }

      50% {
        opacity: 0.3;
        /* The minimum opacity */
      }

      100% {
        opacity: 1;
      }
    }

    #msg {
      margin-top: 8px;
      font-size: 12px;
      opacity: .9;
    }

    .debug-info {
      margin-top: 10px;
      padding-top: 8px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      font-size: 11px;
      font-family: monospace;
      color: #a5d6ff;
      line-height: 1.4;
    }

    .tracking-section-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: rgba(255, 255, 255, 0.4);
      margin-top: 14px;
      margin-bottom: 6px;
      font-weight: 700;
    }

    .player-count-row {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
      font-family: monospace;
      font-size: 12px;
      border-bottom: 1px dashed rgba(255, 255, 255, 0.08);
    }

    .player-count-row:last-child {
      border-bottom: none;
    }

    .player-count-row .p-name {
      color: #eee;
    }

    .player-count-row .p-count {
      font-weight: bold;
      color: #a5d6ff;
    }

    .qr-container {
      display: flex;
      justify-content: center;
      /* Horizontally centers the image */
      align-items: center;
      /* Vertically centers the image */
      height: 200px;
      /* Optional: Set a height for the container */
    }

    .rot-btn {
      position: absolute;
      z-index: 50;
      width: 40px;
      height: 40px;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: white;
      cursor: pointer;
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      transform: translateY(-50%);
      /* Centers vertically on the border */
      user-select: none;
    }

    .rot-btn:hover {
      background: rgba(0, 0, 0, 0.8);
    }

    .rot-btn:active {
      background: #1f6feb;
    }

    .box-item {
      padding: 4px 6px;
      font-size: 12px;
      font-family: monospace;
      background: rgba(255, 255, 255, 0.04);
      border-radius: 4px;
      margin-bottom: 4px;
      color: #fff;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #btnResync {
      position: relative;
    }

    #btnResync>div {
      position: relative;
      width: 32px;
      /* match your svg width */
      height: 32px;
      /* match your svg height */
      display: inline-block;
    }

    #btnResync>div>.label {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 12px;
      font-weight: 700;
      line-height: 1;
      color: currentColor;
      /* or set a color */
      pointer-events: none;
    }

    #btnToggleHand {
      color: inherit;
      padding: 10px;
      font-size: 20px;
      background: rgba(0, 0, 0, 0.6);
      border: 1px solid #444;
      color: white;
      border-radius: 50%;
      cursor: pointer;
    }

    #contextTarget {
      position: absolute;
      width: 64px;
      height: 90px;
      pointer-events: auto;
      opacity: 0.01;
      z-index: 9999;
      display: none;
    }

    /* Fixed Aspect Ratio Dynamic Splash Screen Overlay */
    #splashViewer {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(5, 5, 5, 0.85);
      backdrop-filter: blur(12px);
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }

    #splashViewer.active {
      opacity: 1;
      pointer-events: auto;
    }

    #splashCanvas {
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.9);
      border-radius: 12px;
      display: block;
    }
  </style><!--#CSS-->
</head>

<body>
  <div id="app">
    <img id="contextTarget" src="" alt="card proxy" />
    <canvas id="c"></canvas>

    <div id="hud-left">
      <div class="panel collapsed" id="setupPanel">
        <div class="panel-header" id="btnToggleSetup">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round">
            <line x1="4" x2="20" y1="12" y2="12"></line>
            <line x1="4" x2="20" y1="6" y2="6"></line>
            <line x1="4" x2="20" y1="18" y2="18"></line>
          </svg>
        </div>
        <div class="panel-content">

          <div class="tab-bar">
            <div class="tab-buttons">
              <button class="tab-btn active" data-tab="tab-general">Lobby</button>
              <!--<button class="tab-btn" data-tab="tab-actions">Actions</button>-->
              <button class="tab-btn" data-tab="tab-box">Items</button>
              <button class="tab-btn" data-tab="tab-settings">Settings</button>
            </div>
            <div class="version-display" style="text-align: right;" id="versionDisplay"></div>
          </div>

          <div class="tab-pane active" id="tab-general">
            <div class="row">
              <label style="font-size:12px; opacity:.9; width: 60px;">Room</label>
              <input type="text" id="gameId" value="lunch" />
            </div>
            <div class="row">
              <label style="font-size:12px; opacity:.9; width: 60px;">Name</label>
              <input type="text" id="playerName" value="" />
            </div>
            <div class="row" style="margin-top:10px;">
              <button class="action-btn" id="btnJoin" style="width: 100%;">Join Room</button>
            </div>

            <div id="msg"></div>
            <div class="qr-container">
              <img
                src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://magicbakery.github.io/gb.html&bgcolor=000000&color=FFFFFF"
                alt="QR Code for this App" />
            </div>


          </div>

          <div class="tab-pane" id="tab-actions">
            <div style="padding: 6px 0;">
            </div>
          </div>

          <div class="tab-pane" id="tab-box">
            <div style="display:flex;justify-content: space-evenly;">
              <button class="action-btn" onclick="StowAll()">Stow All</button>
              <button class="action-btn" onclick="SpillAll()">Spill All</button>
              <button class="action-btn" onclick="shuffleAssets()">Reshuffle</button>
            </div>
            <div class="tracking-section-title">Items in Hands</div>
            <div id="countsContainer" style="max-height: 120px; overflow-y: auto; margin-bottom: 6px;">
              <div style="font-size: 11px; opacity: 0.5; font-style: italic;">No active card connections found...</div>
            </div>
            <div class="tracking-section-title" style="margin-top: 0;">Items in Box</div>
            <div id="boxContainer" style="max-height: 160px; overflow-y: auto;">
              <div style="font-size: 11px; opacity: 0.5; font-style: italic;">Box is currently empty...</div>
            </div>
          </div>

          <div class="tab-pane" id="tab-settings">
            <div style="font-size: 12px; font-weight: 600; margin-bottom: 4px; color: rgba(255,255,255,0.7);">
              Table : Hand Ratio
            </div>
            <div class="row" style="gap: 12px; margin-bottom: 12px;">
              <input type="range" id="ratioSlider" min="0" max="6" step="1" value="2" />
              <span id="ratioDisplay"
                style="font-family: monospace; font-size: 13px; font-weight: 700; width: 30px; text-align: right;">33%</span>
            </div>

            <div style="font-size: 12px; font-weight: 600; margin-bottom: 4px; color: rgba(255,255,255,0.7);">
              Seat Orientation
            </div>
            <div class="row" style="gap: 12px;">
              <input type="range" id="seatSlider" min="0" max="360" step="1" value="0" />
              <span id="seatDisplay"
                style="font-family: monospace; font-size: 13px; font-weight: 700; width: 45px; text-align: right;">0°</span>
            </div>
            <label>
              <input type="checkbox" id="seating-compass"
                onchange="localStorage.setItem('seatingCompass', event.target.checked);">
              Show seating compass
            </label><br>
            <label>
              <input type="checkbox" id="chkAutoHideSplash"> Hide hand when showing card
            </label><br>
            <label>
              <input type="checkbox" id="courtesy-flip"
                onchange="localStorage.setItem('courtesyFlip', event.target.checked);">
              Courtesy flip
            </label>

            <div class="debug-info"><!--</div>style="display:none">-->
              <div>Assets: <span id="debugCount">0</span></div>
              <div>Table Pan: <span id="debugTablePan">0, 0</span> | Zoom: <span id="debugTableZoom">1.0</span>x</div>
              <div>Hand Pan: <span id="debugHandPan">0, 0</span> | Zoom: <span id="debugHandZoom">1.0</span>x</div>
            </div>
          </div>



        </div>
      </div>
    </div>

    <div id="hud-right">

    </div>

  </div>

  <div id="footerBar">
    <div class="footerBtnBar" style="margin-top:10px;margin-bottom:-5px;justify-content: space-evenly;">
      <button class="btn" title="Sort Cards in Hand" onclick="SortInHand()">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <!-- Top: left-to-right arrow -->
          <path d="M4 7h10"></path>
          <path d="M18 5l2 2-2 2"></path>
          <path d="M14 7h6"></path>

          <!-- Bottom: cards side-by-side -->
          <rect x="4" y="13" width="4" height="7" rx="1"></rect>
          <rect x="10" y="13" width="4" height="7" rx="1"></rect>
          <rect x="16" y="13" width="4" height="7" rx="1"></rect>

          <!-- Small separators to suggest ordering -->
          <path d="M10 13V20"></path>
          <path d="M16 13V20"></path>
        </svg>


      </button>
      <button class="btn" title="Zoom Out" onclick="TableZoom(-0.25)">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="11" cy="11" r="7"></circle>
          <line x1="8" y1="11" x2="14" y2="11"></line>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
      </button>


      <button class="btn" title="Zoom In" onclick="TableZoom(0.25)">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="11" cy="11" r="7"></circle>
          <line x1="11" y1="8" x2="11" y2="14"></line>
          <line x1="8" y1="11" x2="14" y2="11"></line>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>

      </button>
      <button class="btn" title="Bring to Bottom/Stow" onclick="BringToBottom()" ondblclick="Stow()">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none"
          stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <!-- Fat arrow down -->
          <path d="M12 4v12"></path>
          <path d="M7 10l5 5 5-5"></path>

          <!-- Flattened diamond (box-like) -->
          <path d="M0 16L12 12L24 16L12 20Z"></path>
        </svg>


      </button>
    </div>
    <div class="footerBtnBar" style="justify-content: space-between;">
      <button id="btnRotLeft" class="btn" title="Rotate Left">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 4v6h6" />
          <path d="M3.51 15a9 9 0 1 0 2.12-9.36L1 10" />
        </svg>
      </button>


      <button id="btnToggleHand" class="btn" title="Toggle Hand Visibility" onclick="isHandHidden=!isHandHidden;draw()">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="12" height="16" rx="2" ry="2" transform="rotate(-15 9 11)" fill="#202020" />

          <rect x="6" y="1" width="12" height="16" rx="2" ry="2" fill="#202020" stroke-width="2.5" />

          <rect x="9" y="3" width="12" height="16" rx="2" ry="2" transform="rotate(15 15 11)" fill="#202020" />
        </svg>
      </button>
      <button id="btnResync" class="icon-btn btn" title="Refresh State" data-status="normal" disabled
        onclick="ResyncButton()">
        <div class="btn-resync-content">
          <svg class="icon" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
            <path d="M3 3v5h5" />
            <path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16" />
            <path d="M16 16h5v5" />
          </svg>
          <span id="btnResyncCount" class="label"></span>
        </div>
      </button>
      <button class="btn" id="btnFlipSelected" onclick="flipSelectedAssets()" title="Flip the Selected">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">

          <rect x="4" y="2" width="16" height="20" rx="1" />

          <line x1="12" y1="0" x2="12" y2="26" stroke-dasharray="2 4" />
        </svg>
      </button>

      <button id="btnRotRight" class="btn" title="Rotate Right">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M23 4v6h-6" />
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10" />
        </svg>
      </button>

    </div>

  </div>
  <div id="splashViewer" class="splashViewer">
    <a id="splashLink" href="#" target="_blank" rel="noopener noreferrer" style="display:block;">
      <canvas id="splashCanvas"></canvas>
    </a>
  </div>

  <script>

    const APPS_SCRIPTS = [
      { id: "v24", label: "v24 Shuffle", url: "https://script.google.com/macros/s/AKfycbz8S_zW0BxVHihf5UUX3fgkYbSY2o80mltCoCBrGE7dX7STwxQz4soK5WejhJk1QWjU/exec" },
      { id: "v14", label: "v14", url: "https://script.google.com/macros/s/AKfycbyusChcUVJEcJ4x74iDFhysLjU6lW3yqXRu88oELa0oOmtmh9r2xVjT7WVC714rRJ73/exec" },
      { id: "v21", label: "v21", url: "https://script.google.com/macros/s/AKfycbyiBM2nM1WRlUOrmGj2fRA5tAwTJyUVUTa3CtVmTKQGV4ULAzziKGMUU1cu8TV3GTvf/exec" },

    function AssetsMerge() {
      // 20260714: StarTree: User serverCopy to update assets, but don't change items in assets already on pendingUpdates list unless it became someone else's hand item.
      const complexOwnerId = getServerOwnerId();
      let cat1 = 0;
      let cat2 = 0;
      let cat3 = 0;
      for (const s of serverCopy) {
        // Step 1: Find s in assets by assetId. if it doesn't exist, add it to assets/
        const id = s.assetId;
        let a = assetById.get(id);
        if (!a) {
          assets.push(s);
          assetById.set(id, s);
          cat1++;
          continue;
        }
        // Step 2: s.region==="HAND" and s.ownerId != complexOwnerId, set a.region="HAND" and remove that id from pendingUpdates
        if (s.region === "HAND" && s.ownerId !== complexOwnerId) {
          assetById.set(id, s);
          Object.assign(a, s);
          markAssetPending(id, null, true);
          cat2++;
          continue;
        }
        // Step 3: if s is not in pendingUpdates, copy or replace the corresponding a in assets with s content.
        if (!isPendingUpdate(id)) {
          assetById.set(id, s);
          Object.assign(a, s);
          cat3++;
        } else {
          a.updatedAt = s.updatedAt;
        }
      }
      assets = Array.from(assetById.values());
    }
    function BringToBottom() {
      const minDelta = 1;
      const selected = new Set(selectedIds);

      // Decide where the selected group should land: before the min z of unselected
      let minZUnselected = Infinity;
      for (const a of assets) {
        if (!selected.has(a.assetId)) {
          minZUnselected = Math.min(minZUnselected, Number(a.z || 0));
        }
      }
      if (minZUnselected === Infinity) minZUnselected = 0;

      // Give each selected a new z, keeping their relative order (by current z)
      const selectedAssets = assets
        .filter(a => selected.has(a.assetId))
        .sort((a, b) => Number(a.z || 0) - Number(b.z || 0));

      selectedAssets.forEach((a, i) => {
        if (a.region != "HAND") {
          markAssetPending(a.assetId);
        }
        a.z = minZUnselected - minDelta - (selectedAssets.length - 1 - i); // push below unselected
      });

      draw();
    }

    function BringToTop() {
      const minDelta = 1;
      const selected = new Set(selectedIds);
      // Decide where the selected group should land: after the max z of unselected

      for (const a of assets) {
        if (!selected.has(a.assetId)) {

    async function SaveMoves(moves, legacyPatch, legacyExpectedUpdatedAt) {
      if (!moves) return;
      markAssetPending(null, true);
      const normalizedMoves = Array.isArray(moves)
        ? moves
        : [{
          assetId: moves,
          patch: legacyPatch,
          expectedUpdatedAt: legacyExpectedUpdatedAt
        }];

      if (normalizedMoves.length === 0) return;

      const complexOwnerId = getServerOwnerId();

      const payload = {
        action: "BATCH_APPLY_MOVE",
        gameId,
        playerId: complexOwnerId,
        updates: JSON.stringify(
          normalizedMoves.map(m => ({
            assetId: m.assetId,
            expectedUpdatedAt: String(m.expectedUpdatedAt || ""),
            patch: JSON.stringify(m.patch)
          }))
        )
      };

      const formBody = Object.keys(payload)
        .map(k => encodeURIComponent(k) + "=" + encodeURIComponent(payload[k]))
        .join("&");
      updateSyncStatus("saving");
      const res = await fetch(API_BASE, {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded;charset=UTF-8" },
        body: formBody,
        redirect: "follow"
      });

      const text = await res.text();
      let data = {};
      try { data = JSON.parse(text); } catch (e) { }

      if (!res.ok || !data.ok) {
        const err = data.error || `HTTP ${res.status}`;
        if (err === "CONFLICT") {
          throw Object.assign(new Error("CONFLICT"), {
            code: "CONFLICT",
            currentUpdatedAt: data.currentUpdatedAt || ""
          });
        }
        throw new Error(err);
      }
      updateSyncStatus("normal");
      return data;
    }
    function SortInHand() {
      view.hand.zoom = 1.0;
      view.hand.panX = 0;
      view.hand.panY = 0;
      const complexOwnerId = getServerOwnerId();
      const handCards = assets.filter(a => (a.region || "").toString().toUpperCase() === "HAND" && a.ownerId === complexOwnerId);
      const n = handCards.length;
      if (!n) return;

      // Sort left-to-right by assetId
      const sorted = handCards
        .slice()
        .sort((a, b) => String(a.assetId).localeCompare(String(b.assetId)));

      // Screen-space hand viewport
      const midY = canvas.clientHeight * getTableSplitFactor();
      const handTop = midY;
      const handBottom = canvas.clientHeight;
      const handHeight = handBottom - handTop;

      const zoom = Number(view.hand.zoom || 1);
      const panX = Number(view.hand.panX || 0);
      const panY = Number(view.hand.panY || 0);

      // Choose left/right bounds in screen space (tweak padding as needed)
      const pad = 30;
      const leftScreenX = pad;
      const rightScreenX = canvas.clientWidth - pad;

      // Center in both X and Y within the hand viewport
      const centerScreenY = handTop + handHeight / 2;

      sorted.forEach((a, i) => {
        //const t = (n === 1) ? 0.5 : i / (n - 1); space between
        const t = (i + 0.5) / n; // Space evenly
        const targetScreenX = leftScreenX + t * (rightScreenX - leftScreenX);
        const targetScreenY = centerScreenY;

        // Convert screen -> world (match your typical draw transform: screen = world*zoom + pan)
        a.facedown = false;
        a.rotationDeg = 0;
        a.z = 0;
        a.x = targetScreenX / zoom - panX - canvas.clientWidth / 2;
        a.y = targetScreenY / zoom - panY - targetScreenY - 40;
      });

      saveHandToLocalStorage();
      updateTrackedUIs();
      draw();
    }

    function drawCompass() {
      if (!chkSeatingCompass.checked) { return; }
      /*const colors = ["rgba(255,255,255,1)", "rgba(255,0,0,1)", "rgba(255,215,0,1)", "rgba(0,255,0,1)", "rgba(0,215,255,1)", "rgba(215,0,255,1)"];*/
      const colors = ["rgba(186,90,90,1)", "rgba(247,228,155,1)", "rgba(164,208,139,1)", "rgba(134,188,189,1)", "rgba(159,161,255,1)", "rgba(255,255,255,1)"];
      const greys = [
        "rgba(40,40,40,1)",
        "rgba(50,50,50,1)",
        "rgba(60,60,60,1)",
        "rgba(70,70,70,1)",
        "rgba(80,80,80,1)",
        "rgba(90,90,90,1)"
      ];
      /*const colors = [
        "rgba(140, 68, 68, 1)",
        "rgba(148, 113, 69, 1)",
        "rgba(98, 124, 83, 1)",
        "rgba(80, 112, 112, 1)",
        "rgba(95, 97, 153, 1)",
        "rgba(120, 120, 120, 1)"
      ];*/

      const r0 = 400; // Player area limit
      const r1 = 100; // Compass Radius
      const r2 = 5; // 100
      const r3 = 20; // 118
      const r4 = 12; // 106
      const ctr = worldToScreen('table', 0, 0);
      /*ctx.strokeStyle = "rgba(255,255,255,0.25)";
      ctx.beginPath();
      ctx.arc(ctr.x, ctr.y, r0 * view.table.zoom, 0, Math.PI * 2);
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(ctr.x, ctr.y, r1 * view.table.zoom, 0, Math.PI * 2);
      ctx.stroke();*/

      ctx.lineWidth = 3 * view.table.zoom;
      let players = countPlayers();

      let deg = 30;
      let deg2 = (360 / players / 2) * Math.PI / 180;
      let deg3 = getSeatOrientationDegrees() * Math.PI / 180;
      const step = (Math.PI) / players;      // radians per orientation
      const rot = getSeatOrientationDegrees() * Math.PI / 180;
      for (let i = 0; i < players; i++) {
        ctx.strokeStyle = colors[i];
        ctx.fillStyle = colors[i];
        ctx.lineWidth = 1 * view.table.zoom;
        ctx.beginPath();
        let pt1 = wtsPolar(r3, -i * 360 / players);
        let pt2 = wtsPolar(r4, -deg - i * 360 / players);
        let pt3 = wtsPolar(r4, +deg - i * 360 / players);
        let pt4 = wtsPolar(r4 + 2, -i * 360 / players);
        ctx.moveTo(pt4.x, pt4.y);
        ctx.lineTo(pt2.x, pt2.y);
        ctx.lineTo(pt1.x, pt1.y);
        ctx.lineTo(pt3.x, pt3.y);
        ctx.closePath();
        ctx.stroke();
        ctx.fill();

        let cr = (i * 2 * step) + rot + Math.PI / 2;
        ctx.lineWidth = 300 * view.table.zoom;
        ctx.strokeStyle = greys[i];
        ctx.beginPath();
        ctx.arc(ctr.x, ctr.y, (r1 + (r0 - r1) / 2) * view.table.zoom, cr - step, cr + step);
        ctx.stroke();
      }
      ctx.lineWidth = 3 * view.table.zoom;

      let cy = (canvas.clientHeight * getTableSplitFactor()) / 2;
      if (bPrecise) {
        cy = canvas.clientHeight * getTableSplitFactor();

      const world = screenToWorld("table", cx, cy);

      const size = Math.min(canvas.clientWidth, canvas.clientHeight) / 2.5;
      const angle = Math.random() * 2 * Math.PI;
      let radius = Math.max(125, Math.sqrt(Math.random()) * size);
      if (a.tag.includes("player")) {
        radius = 50;
      } else if (a.tag == "") {
        radius = 75;
      }

      if (bPrecise) {
        a.x = world.x;
        a.y = world.y;
        a.rotationDeg = (360 - getSeatOrientationDegrees()) % 360
      } else {
        a.x = world.x + (Math.cos(angle) * radius);

    function screenToWorld(viewport, sx, sy) {
      const r = viewport === 'table' ? tableRect() : handRect();
      const v = view[viewport];

      let dx = sx - r.x - r.w * 0.5;
      let dy = sy - r.y - r.h * 0.5;

      if (viewport === 'table') {
        const angleRad = -getSeatOrientationDegrees() * Math.PI / 180;
        const rx = dx * Math.cos(angleRad) - dy * Math.sin(angleRad);
        const ry = dx * Math.sin(angleRad) + dy * Math.cos(angleRad);
        dx = rx; dy = ry;
      }

      return { x: (dx - v.panX) / v.zoom, y: (dy - v.panY) / v.zoom };
    }

        const rx = lx * Math.cos(angleRad) - ly * Math.sin(angleRad);
        const ry = lx * Math.sin(angleRad) + ly * Math.cos(angleRad);
        lx = rx; ly = ry;
      }

      return { x: r.x + r.w * 0.5 + lx, y: r.y + r.h * 0.5 + ly };

    function formatColorString(rawColor) {
      if (!rawColor) return "rgba(45, 110, 210, 0.4)";
      let cleaned = rawColor.trim();
      if (cleaned.startsWith('0x') || cleaned.startsWith('0X')) {
        return '#' + cleaned.slice(2);
      }
      return cleaned;
    }

    function parsePlaceholder(urlStr) {
      if (!urlStr || !urlStr.includes('|')) return null;

      const front = { shape: 'card', size: 64, color: 'rgba(45, 110, 210, 0.4)', number: null };
      const back = { shape: null, size: null, color: 'saddlebrown' };
      const tokens = urlStr.split('|');
      const counts = { shape: 0, size: 0, color: 0 };

      for (const token of tokens) {
        const [key, val] = token.split(':');
        if (key && val) {
          const k = key.trim().toLowerCase();
          const v = val.trim();

          if (k === 'shape') {
            counts.shape++;
            if (counts.shape === 1) front.shape = v.toLowerCase();
            else if (counts.shape === 2) back.shape = v.toLowerCase();
          } else if (k === 'size') {
            counts.size++;
            const parsedSize = parseFloat(v) || 64;
            if (counts.size === 1) front.size = parsedSize;
            else if (counts.size === 2) back.size = parsedSize;
          } else if (k === 'color') {
            counts.color++;
            const formattedColor = formatColorString(v);
            if (counts.color === 1) front.color = formattedColor;
            else if (counts.color === 2) back.color = formattedColor;
          } else if (k === 'number') {
            // 2. Add the number argument
            front.number = v;
          }
        }
      }

      if (!back.shape) back.shape = front.shape;
      if (!back.size) back.size = front.size;
      if (!back.color) back.color = "#141414";

      return { front, back };
    }

    function getAssetDimensions(card) {

        }
        return { w: target.size, h: target.size, isPlaceholder: true, config: target };
      }
      return { w: 64, h: 64 * 1.4, isPlaceholder: false, config: null };
    }
    function getDistance(t1, t2) {

    function drawCardToCtx(context, card, x, y, scale, isSelected, relativeToViewport) {
      const { w, h, isPlaceholder, config } = getAssetDimensions(card);
      const radius = getCardRadiusFromCSS();

      context.save();
      context.translate(x, y);
      context.scale(scale, scale);

      let finalRotation = (card.rotationDeg || 0);
      if (relativeToViewport === 'table') {
        finalRotation += getSeatOrientationDegrees();
      }
      context.rotate(finalRotation * Math.PI / 180);

      // --- Selection / Background Drawing ---
      if (isSelected) {
        context.shadowBlur = 12;
        context.shadowColor = "#ffd700";
        context.strokeStyle = "#ffd700";
        context.lineWidth = 3;
      } else {
        //Shadow
        context.globalAlpha = 0.35;
        context.fillStyle = "#000";
        context.beginPath();
        if (isPlaceholder && config.shape === 'disk') {
          context.arc(0, 0, w / 2 + 1, 0, Math.PI * 2);
        } else {
          context.roundRect(-w / 2 + -1, -h / 2 + -1, w + 2, h + 2, radius);
        }
        context.fill();
        context.globalAlpha = 1;
        context.shadowBlur = 0;

      }

      // --- Card Face Rendering ---
      if (!!card.facedown && !isPlaceholder) {
        context.fillStyle = "saddlebrown";
        context.beginPath();
        context.roundRect(-w / 2, -h / 2, w, h, radius);
        context.fill();

        context.strokeStyle = "#ffffff";
        context.lineWidth = 1.5;
        context.beginPath();
        context.roundRect(-w / 2 + 4, -h / 2 + 4, w - 8, h - 8, Math.max(1, radius - 3));
        context.stroke();

        if (isSelected) {
          context.strokeStyle = "#ffd700";
          context.lineWidth = 3;
          context.beginPath();
          context.roundRect(-w / 2, -h / 2, w, h, radius);
          context.stroke();
        }
      } else {
        context.beginPath();
        if (isPlaceholder && config.shape === 'disk') {
          context.arc(0, 0, w / 2, 0, Math.PI * 2);
        } else {
          context.roundRect(-w / 2, -h / 2, w, h, radius);
        }
        context.clip();

        const cachedPromise = imgCache.get(card.imageUrl);
        const hasValidImage = (!isPlaceholder && cachedPromise && cachedPromise._image && cachedPromise._loaded);

        if (hasValidImage) {
          context.drawImage(cachedPromise._image, -w / 2, -h / 2, w, h);
        } else {
          const displayValue = card.number || (isPlaceholder ? config.number : null);
          context.fillStyle = isPlaceholder ? config.color : "rgba(45, 110, 210, 0.4)";
          if (isPlaceholder && config.shape === 'disk') {
            context.beginPath(); context.arc(0, 0, w / 2, 0, Math.PI * 2); context.fill();
          } else {
            context.fillRect(-w / 2, -h / 2, w, h);
          }

          // --- New Logic for Number vs Name ---          

          if (!hasValidImage && !card.facedown) {
            if (displayValue) {
              // Draw Small Number (Top-Left)
              context.fillStyle = "rgba(255,255,255,1)"; // Slightly dimmer than the big one
              context.font = `bold ${w * 0.25}px sans-serif`; // Small font (20% of width)
              context.textAlign = "left";
              context.textBaseline = "top";
              // Position: -w/2 (left edge) + padding, -h/2 (top edge) + padding
              context.fillText(displayValue, -w / 2 + (w * 0.07), -h / 2 + (h * 0.05));

              // Display BIG number
              context.fillStyle = "rgba(255,255,255,1)";
              context.font = `bold ${w}px sans-serif`;
              context.textAlign = "center";
              context.textBaseline = "middle";
              context.fillText(displayValue, 0, h / 15);

              if (displayValue === "6" || displayValue === "9") {
                // Line under the number
                const y = h / 15 + w * 0.4;      // tweak if needed
                const lineW = w * 0.5;            // tweak if needed
                context.strokeStyle = "rgba(255,255,255,1)";
                context.lineWidth = Math.max(2, w * 0.1); // tweak if needed
                context.beginPath();
                context.moveTo(-lineW / 2, y);
                context.lineTo(lineW / 2, y);
                context.stroke();
              }
            } else {
              // Fallback to name
              context.fillStyle = "rgba(255,255,255,1)";
              context.font = "bold 10px system-ui";
              context.textAlign = "center";
              context.textBaseline = "middle";
              context.fillText(card.name.slice(0, 16), 0, 0);
            }
          }
        }

        context.beginPath();
        if (isPlaceholder && config.shape === 'disk') {
          context.arc(0, 0, w / 2, 0, Math.PI * 2);
        } else {
          context.roundRect(-w / 2, -h / 2, w, h, radius);
        }
        context.strokeStyle = isSelected ? "#ffd700" : (isPlaceholder ? "#ffffff" : "rgba(255,255,255,0.20)");
        context.lineWidth = isSelected ? 3 : (isPlaceholder ? 3 : 1);
        context.stroke();
      }
      context.restore();
    }

    function drawCard(card, viewport) {
      const v = view[viewport];
      const screen = worldToScreen(viewport, card.x, card.y);
      drawCardToCtx(ctx, card, screen.x, screen.y, v.zoom, isSelected(card.assetId), viewport);
    }

    // High-Fidelity Maximized Un-distorted Splash Magnifier Component
    function triggerSplashView(card) {
      if (!card) return;
      const splashLink = document.getElementById('splashLink');
      splashLink.href = card.imageUrl;

      // (optional) keep target blank
      splashLink.target = '_blank';

      let finalW = w;

      if (!isPlaceholder && cachedPromise && cachedPromise._image && cachedPromise._loaded) {
        finalW = cachedPromise._image.naturalWidth || w;
        finalH = cachedPromise._image.naturalHeight || h;
      }

      const maxAllowedW = window.innerWidth * 0.85;
      const maxAllowedH = window.innerHeight * 0.85;

      let targetScale = Math.min(maxAllowedW / finalW, maxAllowedH / finalH);

      splashCanvas.width = Math.floor(finalW * targetScale * dpr);
      splashCanvas.height = Math.floor(finalH * targetScale * dpr);
      splashCanvas.style.width = `${Math.floor(finalW * targetScale)}px`;
      splashCanvas.style.height = `${Math.floor(finalH * targetScale)}px`;

      splashCtx.setTransform(dpr, 0, 0, dpr, 0, 0);

      // Render card relative inside splash viewport boundary canvas frames directly
      const cardMock = Object.assign({}, card, { rotationDeg: 0 });

      drawCardToCtx(splashCtx, cardMock, (finalW * targetScale) / 2, (finalH * targetScale) / 2, scaleRender, false, 'splash');

    function draw() {
      ctx.clearRect(0, 0, canvas.clientWidth, canvas.clientHeight);
      const midY = canvas.clientHeight * getTableSplitFactor();
      // Create a list of assets that ARE NOT being dragged
      const draggingId = drag ? drag.assetId : null;

      // 1. Draw Table base components
      if (midY > 0) {
        ctx.fillStyle = "rgba(255,255,255,0.15)"; ctx.font = "10px monospace";


        // Draw compass
        drawCompass();

        const tCards = assets.filter(a => (a.region || "").toString().toUpperCase() === "TABLE" && a.assetId !== draggingId);
        tCards.sort((a, b) => Number(a.z || 0) - Number(b.z || 0));

        const cap = assetById.get("E5");

        for (const c of tCards) {
          drawCard(c, 'table');
        }
      }

      // 2. Draw Hand background layer
      if (!isHandHidden && midY < canvas.clientHeight) {
        ctx.save();
        ctx.fillStyle = "rgba(0, 0, 0, 0.7)"; // Transparent hand
        ctx.fillRect(0, midY, canvas.clientWidth, canvas.clientHeight - midY);
        ctx.strokeStyle = "rgba(255,255,255,0.12)"; ctx.beginPath(); ctx.moveTo(0, midY); ctx.lineTo(canvas.clientWidth, midY); ctx.stroke();
        ctx.restore();
        const complexOwnerId = getServerOwnerId();
        const hCards = assets.filter(a => (a.region || "").toString().toUpperCase() === "HAND" && a.assetId !== draggingId && a.ownerId === complexOwnerId);
        hCards.sort((a, b) => (Number(a.y || 0) + Number(a.x || 0)) - (Number(b.y || 0) + Number(b.x || 0)));
        for (const c of hCards) drawCard(c, 'hand');
      }

      // 3. Draw Dragged Asset LAST (Top Z)
      if (drag) {
        const a = assetById.get(drag.assetId);
        if (a) drawCard(a, drag.viewport);
      }

      debugTablePanEl.textContent = `${view.table.panX.toFixed(0)}, ${view.table.panY.toFixed(0)}`;
      debugTableZoomEl.textContent = view.table.zoom.toFixed(1);
      debugHandPanEl.textContent = `${view.hand.panX.toFixed(0)}, ${view.hand.panY.toFixed(0)}`;
      debugHandZoomEl.textContent = view.hand.zoom.toFixed(1);
    }
    // 1. New helper: Checks a specific region (TABLE or HAND) for a card
    function getCardAtPointInRegion(regionName, sx, sy) {
      let cards = [];
      const complexOwnerId = getServerOwnerId();
      if (regionName === "TABLE") {
        cards = assets.filter(a => (a.region || "").toString().toUpperCase() === regionName);
      } else if (regionName === "HAND") {
        cards = assets.filter(a => (a.region || "").toString().toUpperCase() === regionName && a.ownerId === complexOwnerId);
      } else {
        return null;
      }



      // We use the view associated with the region name
      const v = view[regionName.toLowerCase()];
      const ordered = cards.slice().sort((a, b) => Number(a.z || 0) - Number(b.z || 0)).reverse();

      for (const c of ordered) {
        const { w, h, isPlaceholder, config } = getAssetDimensions(c);
        const scaledW = w * v.zoom;
        const scaledH = h * v.zoom;
        const sc = worldToScreen(regionName.toLowerCase(), c.x, c.y);
        const dx = sx - sc.x;
        const dy = sy - sc.y;

        let finalRotation = (c.rotationDeg || 0);
        if (regionName === 'TABLE') {
          finalRotation += getSeatOrientationDegrees();
        }
        const ang = finalRotation * Math.PI / 180;
        const lx = dx * Math.cos(-ang) - dy * Math.sin(-ang);
        const ly = dx * Math.sin(-ang) + dy * Math.cos(-ang);

        if (isPlaceholder && config.shape === 'disk') {
          if ((lx * lx + ly * ly) <= (scaledW * scaledW) / 4) return c;
        } else {
          if (Math.abs(lx) <= scaledW / 2 && Math.abs(ly) <= scaledH / 2) return c;
        }
      }
      return null;
    }

    // 2. Updated hitTest: Orchestrates the search
    function hitTest(sx, sy) {
      const viewport = getViewportForPointer(sx, sy);
      const factor = getTableSplitFactor();

      // If the hand is NOT hidden, try to find a card in the hand first
      if (!isHandHidden && viewport === "hand" && factor !== 1) {
        const handCard = getCardAtPointInRegion("HAND", sx, sy);
        if (handCard) return handCard;
        return null;
      }

      // Always try to find a card on the table
      // (This works even if the click is in the "hand" overlay area)
      if (factor !== 0) {
        return getCardAtPointInRegion("TABLE", sx, sy);
      }

      return null;
    }
    // Example of how to send the batch from your HTML
    async function shuffleAssets() {
      if (!confirm("Reshuffle?")) { return; }
      try {
        updateSyncStatus("saving");
        await tryWithResync(async () => {
          const body = new URLSearchParams({
            action: "BATCH_SHUFFLE",
            gameId: gameId,
            tag: "shuffle",
          });
          const response = await fetch(API_BASE, {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body: body.toString(),
          });
          const data = await response.json();
          console.log("Shuffle complete:", data);
        });
        await fetchState(); // Sync state after save
        updateSyncStatus("normal");
        draw();
      } catch (err) {
        console.error("Failed to shuffle:", err);
        updateSyncStatus("error");
      }
    }

    function onPointerMove(e) {
      if (!activePan || !usePointerEvents) return;
      const rect = canvas.getBoundingClientRect();
      const currentX = e.clientX - rect.left;
      const currentY = e.clientY - rect.top;
      pointer.x = currentX;
      pointer.y = currentY;

      if (drag) {
        drag.hasMovedSignificantAmount = true;
        markAssetSelected(drag.assetId);
        BringToTop();


        // Detect if we crossed the border
        const currentVp = getViewportForPointer(pointer.x, pointer.y);
        const a = assetById.get(drag.assetId);

        if (currentVp !== drag.viewport && a) {
          // Crossing border: Update region and rotation immediately
          drag.viewport = currentVp;
          a.region = currentVp === "hand" ? "HAND" : "TABLE";

          if (a.region === "HAND") {
            a.rotationDeg = 0; // Upright to player in hand
          } else {
            // Rotate to match table orientation
            if (chkCourtesyFlip.checked) {
              a.rotationDeg = (360 - getSeatOrientationDegrees() + 180) % 360;
            } else {
              a.rotationDeg = (360 - getSeatOrientationDegrees()) % 360;
            }

          }
        }
        if (a.region === "TABLE") {
          markAssetPending(drag.assetId);
        }

        // Apply movement
        const world = screenToWorld(drag.viewport, pointer.x, pointer.y);
        if (a) {
          a.x = drag.startAsset.x + (world.x - drag.startPointerWorld.x);
          a.y = drag.startAsset.y + (world.y - drag.startPointerWorld.y);
          draw();
        }
        return;
      }

      // Inside onPointerMove(e)
      // In onPointerMove(e)

      if (panDrag) {
        const v = view[panDrag.viewport];

        // 1. Calculate raw delta and scale by zoom
        // We calculate (current - last) to get accurate distance regardless of browser
        let dx = (e.clientX - panDrag.lastX) / v.zoom;
        let dy = (e.clientY - panDrag.lastY) / v.zoom;

        // 2. Update last position for the next frame
        panDrag.lastX = e.clientX;
        panDrag.lastY = e.clientY;

        // 3. Apply rotation (only if viewport is 'table')
        if (panDrag.viewport === 'table') {
          const angleRad = getSeatOrientationDegrees() * Math.PI / 180;
          const rx = dx * Math.cos(angleRad) + dy * Math.sin(angleRad);
          const ry = -dx * Math.sin(angleRad) + dy * Math.cos(angleRad);
          dx = rx;
          dy = ry;
          v.panX += dx * v.zoom; //@@
          v.panY += dy * v.zoom;
          //console.log("1803 " + v.zoom);
          draw();
        }

        // 4. Update pan
        //v.panX += dx; //@@
        //v.panY += dy;





      }
    }


    function onPointerDown(e) {
      e.preventDefault();
      lastInteraction = new Date();
      usePointerEvents = true;
      activePan = true;

      contextTarget.style.display = 'none';
      const rect = canvas.getBoundingClientRect();
      const sx = e.clientX - rect.left; const sy = e.clientY - rect.top;
      const viewport = getViewportForPointer(sx, sy);

      const hit = hitTest(sx, sy);

      // Record panning start coordinate
      if (!hit) {
        selectAsset(null);
        panDrag = {
          viewport,
          lastX: e.clientX, // Store raw client coordinates
          lastY: e.clientY
        };
        canvas.setPointerCapture(e.pointerId);
        return; // Exit here because we are panning
      }

      // Hand object selection
      selectAsset(hit.assetId);

      // Set Setup Drag coordinates
      canvas.setPointerCapture(e.pointerId);
      updateTrackedUIs();
      draw();

      const sc = worldToScreen(viewport, hit.x, hit.y);
      drag = {
        viewport,
        assetId: hit.assetId,
        hasMovedSignificantAmount: false,
        startPointerWorld: screenToWorld(viewport, sx, sy),
        startAsset: {
          x: hit.x,
          y: hit.y,
          rotationDeg: hit.rotationDeg || 0,
          facedown: !!hit.facedown,
          region: hit.region
        },
        mouseOffsetScreen: { x: sx - sc.x, y: sy - sc.y }
      };
    }

    function onPointerUp(e) {
      activePan = false;
      usePointerEvents = false;
      // 1. Handle Panning cleanup
      if (panDrag && (e.button === 2 || e.button === 0)) {
        canvas.releasePointerCapture(e.pointerId);
        panDrag = null;
        return;
      }

      canvas.releasePointerCapture(e.pointerId);
      if (panDrag) { panDrag = null; return; }
      if (!drag) return;

      const localDragRef = drag; drag = null;
      const a = assetById.get(localDragRef.assetId); if (!a) return;

      if (!localDragRef.hasMovedSignificantAmount) return;

      const endVp = getViewportForPointer(pointer.x, pointer.y);
      const wasInHand = (localDragRef.startAsset.region || "").toString().toUpperCase() === "HAND";
      const nowInHand = endVp === "hand";

      // 2. Update Position
      if (localDragRef.viewport !== endVp) {
        const dropCenterScreenX = pointer.x - localDragRef.mouseOffsetScreen.x;
        const dropCenterScreenY = pointer.y - localDragRef.mouseOffsetScreen.y;
        const targetWorld = screenToWorld(endVp, dropCenterScreenX, dropCenterScreenY);
        a.x = Math.round(targetWorld.x);
        a.y = Math.round(targetWorld.y);
      } else {
        a.x = Math.round(a.x);
        a.y = Math.round(a.y);
      }

      // 3. Update Region and Owner
      a.region = nowInHand ? "HAND" : "TABLE";
      a.ownerId = nowInHand ? getServerOwnerId() : "";

      // 4. Update Rotation logic
      if (wasInHand && !nowInHand) {
        // Moved from Hand to Table: adjust to seat orientation
        if (chkCourtesyFlip.checked) {
          a.rotationDeg = (360 - getSeatOrientationDegrees() + 180) % 360;
        } else {
          a.rotationDeg = (360 - getSeatOrientationDegrees()) % 360;
        }

        bringToFront(a.assetId);
        BringToTop();
      } else if (!wasInHand && nowInHand) {
        // Moved from Table to Hand: reset to 0
        a.rotationDeg = 0;
        bringToFront(a.assetId);
      }

      // 5. Local Storage (if the card touched the hand area)
      if (wasInHand || nowInHand) {
        saveHandToLocalStorage();
        bringToFront(a.assetId);
      }

      // 6. Update Display
      draw();
      // No server API calls here anymore!
    }

    function onWheel(e) {
      e.preventDefault();
      const rect = canvas.getBoundingClientRect();
      const sx = e.clientX - rect.left; const sy = e.clientY - rect.top;
      const viewport = getViewportForPointer(sx, sy);

      const v = view[viewport];
      const r = viewport === 'table' ? tableRect() : handRect();

      // Screen-to-world logic extracted locally to maintain anchor regardless of live table seating rotations 
      let dx = sx - r.x - r.w * 0.5;
      let dy = sy - r.y - r.h * 0.5;
      if (viewport === 'table') {
        const angleRad = -getSeatOrientationDegrees() * Math.PI / 180;
        const rx = dx * Math.cos(angleRad) - dy * Math.sin(angleRad);
        const ry = dx * Math.sin(angleRad) + dy * Math.cos(angleRad);
        dx = rx; dy = ry;
      }

      const worldX = (dx - v.panX) / v.zoom;
      const worldY = (dy - v.panY) / v.zoom;

      v.zoom *= Math.exp(-e.deltaY * 0.0015);
      v.zoom = Math.max(0.5, Math.min(3.0, v.zoom));

      v.panX = dx - worldX * v.zoom; // @@
      v.panY = dy - worldY * v.zoom;
      //console.log("1945")
      draw();
    }

    canvas.addEventListener('dblclick', (e) => {
      handleClickAtClientXY(e.clientX, e.clientY);
    });
    splashCanvas.addEventListener('click', (e) => {
      event.preventDefault();
      if (ignoreNextClick) {
        ignoreNextClick = false;
        e.preventDefault();
        e.stopPropagation();
        return;
      }
      
      // else: normal click behavior (if you have one)
    });


    contextTarget.addEventListener('mouseleave', () => { contextTarget.style.display = 'none'; });

    canvas.addEventListener('pointermove', onPointerMove);
    canvas.addEventListener('pointerdown', onPointerDown);
    canvas.addEventListener('pointerup', onPointerUp);
    canvas.addEventListener('wheel', onWheel, { passive: false });
    canvas.addEventListener('touchstart', (e) => {
      // If we are already dragging a card (from your existing logic), don't pan/zoom
      lastInteraction = new Date();
      if (e.touches.length !== 1) return;
      if (drag) return;


      if (e.touches.length > 0) {
        touchGesture.active = true;
        touchGesture.lastTouches = Array.from(e.touches);

        // Determine if we are interacting with Table or Hand
        const firstY = e.touches[0].clientY;
        touchGesture.targetView = (firstY < canvas.clientHeight * getTableSplitFactor()) ? 'table' : 'hand';

        if (e.touches.length === 2) {
          touchGesture.lastDistance = getDistance(e.touches[0], e.touches[1]);
        }
      }
    }, { passive: false });
    canvas.addEventListener('touchmove', (e) => {
      if (usePointerEvents) return;

      if (!activePan) return;
      const t = e.touches[0];
      if (!touchGesture.active || drag) return;
      e.preventDefault(); // Stop page scrolling

      const v = view[touchGesture.targetView];

      // Panning (1 finger)
      if (e.touches.length === 1) {
        const dx = e.touches[0].clientX - touchGesture.lastTouches[0].clientX;
        const dy = e.touches[0].clientY - touchGesture.lastTouches[0].clientY;
        v.panX += dx; // @@
        v.panY += dy;
        console.log("1997")

      }
      // Zooming (2 fingers)
      else if (e.touches.length === 2) { // Disabled for now. Buggy.
        const dist = getDistance(e.touches[0], e.touches[1]);
        const zoomDelta = dist / touchGesture.lastDistance;
        v.zoom *= zoomDelta;
        touchGesture.lastDistance = dist;
      }

      touchGesture.lastTouches = Array.from(e.touches);
      draw();
    }, { passive: false });
    canvas.addEventListener('touchend', (e) => {
      if (e.changedTouches.length > 1) return;
      const t = e.changedTouches[0];
      const now = Date.now();
      // (tune this if needed)
      if (now - lastTapTs < 300) {
        ignoreNextClick = true;
        handleClickAtClientXY(t.clientX, t.clientY);
        e.preventDefault();
      }
      lastTapTs = now;

      if (e.touches.length === 0) {
        touchGesture.active = false;
      } else {
        // Update last touches so jump isn't huge if one finger lifts
        touchGesture.lastTouches = Array.from(e.touches);
        if (e.touches.length === 2) {
          touchGesture.lastDistance = getDistance(e.touches[0], e.touches[1]);
        }
      }
    }, { passive: false });
    async function flipAsset(a) {
      if (!a) return;
      a.facedown = !a.facedown;
      if ((a.region || "").toString().toUpperCase() === "HAND") {
        saveHandToLocalStorage();
      }
      draw(); // Local change only
    }
    // Helper to save a specific asset's rotation to the server
    // NOTHING is calling this function. Is it.
    async function saveAssetRotation(assetId) {
      const a = assetById.get(assetId);
      if (!a) return;

      // Only save if it's on the table, as requested
      if (a.region !== "TABLE") return;

      try {
        updateSyncStatus("saving");
        const patch = { rotationDeg: a.rotationDeg };
        await tryWithResync(async () => {
          await SaveMoves(a.assetId, patch, a.updatedAt);
        });
        await fetchState(); // Sync state after save
        updateSyncStatus("normal");
      } catch (err) {
        console.error("Failed to save rotation:", err);
        //updateSyncStatus("error");
      }
    }

    async function trySaveAsset(assetIds) {
      if (!originalStatesById) return;
      if (!assetIds && !Array.isArray(assetIds)) {
        assetIds = [assetIds].filter(Boolean);
      }

      // mark all touched assets pending (deduped)
      if (assetIds) { for (const id of assetIds) markAssetPending(id); }
      if (!hasPendingUpdates()) return;

      // build per-asset moves using each asset's own originalState
      const moves = [];

      for (const assetId of pendingUpdates) {
        const a = assetById.get(assetId);
        const originalState = originalStatesById[assetId];
        if (!a || !originalState) continue;

        const originalStateObj = JSON.parse(originalState);

        const wasInHand = (originalStateObj.region || "").toString().toUpperCase() === "HAND";
        const nowInHand = (a.region || "").toString().toUpperCase() === "HAND";

        // skip Hand-Internal
        if (wasInHand && nowInHand) continue;

        const currentState = JSON.stringify({
          x: a.x, y: a.y, z: a.z, rotationDeg: a.rotationDeg,
          facedown: a.facedown, region: a.region, ownerId: a.ownerId
        });
        if (currentState === originalState) continue;
        moves.push({
          assetId: a.assetId,
          expectedUpdatedAt: a.updatedAt,
          patch: {
            x: a.x, y: a.y, z: a.z, rotationDeg: a.rotationDeg,
            facedown: a.facedown, region: a.region, ownerId: a.ownerId
          }
        });
      }

      if (moves.length === 0) return;

      msgEl.textContent = "Saving...";
      updateSyncStatus("saving");
      try {
        await tryWithResync(async () => SaveMoves(moves));
        await fetchState();
        await warmImages();
        msgEl.textContent = "Saved.";
        updateSyncStatus("normal");

        // refresh originals for assets we just saved (optional but usually desirable)
        for (const m of moves) setOriginalStateForAsset(m.assetId);
      } catch (err) {
        msgEl.textContent = `Error: ${err.message}`;
        //updateSyncStatus("error");

      }
    }
    function selectAsset(id) {
      // If user clicked on nothing: save old one (legacy behavior) and clear selection.
      if (id == null) {
        // 20260712: StarTree: This could be an option of whether to save when clicking on blank area.
        selectedIds = [];
        selectedId = null;
        if (hasPendingUpdates() || selectedId){
          trySaveAsset();
          autoSyncStart(true);
        }  
        updateTrackedUIs();
        draw();
        return;
      }

      // Toggle selection (multi-select)
      if (selectedIds.includes(id)) {
        //if (selectedId || hasPendingUpdates()) trySaveAsset(selectedId); // legacy save
        selectedIds = selectedIds.filter(x => x !== id);

        // remove original for that asset
        //delete originalStatesById[id];
      } else {
        markAssetSelected(id);
      }
      // Legacy: latest selected *still selected*
      selectedId = selectedIds.length ? selectedIds[selectedIds.length - 1] : null;
      // Legacy single originalState mirrors the latest selected one
      if (selectedId) {
        originalState = originalStatesById[selectedId] || null;
      } else {
        originalState = null;
      }
      updateTrackedUIs();
      draw();
    }

    window.addEventListener('keydown', async (e) => {
      if (!myJoined || !selectedId) return;
      if (e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA')) return;
      const a = assetById.get(selectedId); if (!a) return;
    });

    btnJoin.addEventListener('click', async () => {
      const gid = (gameIdEl.value || "").trim();
      if (!gid) return;
      gameId = gid; myJoined = true; btnJoin.disabled = true;
      msgEl.textContent = "Joining…";
      updateSyncStatus("saving");

      try {
        await fetchState(); await warmImages(); draw();
        msgEl.textContent = "Connected."; btnResync.disabled = false;
        setupPanel.classList.add('collapsed');
        updateSyncStatus("normal");
      } catch (err) {
        msgEl.textContent = `Join failed: ${err.message || err}`; btnJoin.disabled = false;
        //updateSyncStatus("error");
      }
    });


    async function ResyncButton() {
      selectAsset(null);
      if (hasPendingUpdates()) {
        await trySaveAsset();
        autoSyncStart(true);
      } else {
        try {
          await resync(); draw();
        } catch (err) {
          msgEl.textContent = `Refresh failed: ${err.message || err}`;
        }
        autoSyncStart(true);
      }
    }

  </script>
