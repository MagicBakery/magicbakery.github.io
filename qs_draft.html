            height: 30px;

            z-index: 1001;
            pointer-events: auto !important;
            cursor: cell;
        }

        .map-crosshair::before,

            content: '';
            position: absolute;
            background: #ffffff;
            box-shadow: 0 0 2px rgba(0, 0, 0, 0.8);
        }

        .map-crosshair::before {
            top: 14px;
            left: 0;

    <script>
        let activeEntry = null;
        let reTargetUTC = "";
        let map, activeStreetLayer, activeSatelliteLayer;
        let currentMapMode = 'street';
        const defaultCenter = [38.5449, -121.7405]; // Davis, CA coordinates
        let hasFetchedFromApi = false;
        let localLandmarks = []; // Array to maintain the active landmark references and state data
        let sightingsLayerGroup = null;
        let currentActiveSightingQuestId = null;

        // Set API and show them on Settings screen.
        QuestSDK.init(QUEST_CONFIG);

        window.onload = async () => {
            urlParams = new URLSearchParams(window.location.search);
            const rawId = urlParams.get('id');
            if (rawId) {
                await fetchFromCacheOnFirstStart(true); // This takes some time.

                    alert(`The entry ${rawId} specified in the URL is not found.`);

        window.addEventListener('beforeunload', (event) => {
            event.preventDefault();
                localStorage.setItem("clientLV", "0");
                localStorage.setItem("clientBD", Date.now().toString()); // UTC Timestamp in ms
            } else {
                // 2) Check if timestamp is at least 1 day old (24 hours = 86400000 ms)
                const startedTime = parseInt(clientBD, 10);
                const oneDayInMs = 24 * 60 * 60 * 1000;

                if ((clientLV === "0" || !clientLV) && (Date.now() - startedTime >= oneDayInMs)) {
                    localStorage.setItem("clientLV", "1");
                }
            }


            /*if (localStorage.getItem("h_submitterId")) document.getElementById("submitterId").value = localStorage.getItem("h_submitterId");*/
            if (localStorage.getItem("h_questId")) document.getElementById("questId").value = localStorage.getItem("h_questId");

            const savedTheme = localStorage.getItem("map_street_theme") || "soft";
            document.getElementById("themeSelect").value = savedTheme;

            currentMapMode = localStorage.getItem("map_view_mode") || "street";

            const showCrosshair = localStorage.getItem("show_map_crosshair") === "true";
            document.getElementById("crosshairToggle").checked = showCrosshair;

            MEMForm(true);
            MEMValue('Notepad', true);
            initLayoutState();
            initGISCore();
            initResizeWatchdog();
            updateCrosshairVisibility(showCrosshair);


            // Grab references to the target input field and the submit button
            const submitterInput = document.getElementById("MsgFormQuester");
            const logButton = document.getElementById("submitBtn");

            // Validation rule function
            function validateSubmitterId() {
                if (submitterInput && logButton) {
                    if (submitterInput.value.includes('|')) {
                        logButton.disabled = true;
                        logButton.style.opacity = "0.4"; // Visual cue indicating disabled state
                        logButton.style.cursor = "not-allowed";
                    } else {
                        logButton.disabled = false;
                        logButton.style.opacity = "1.0";
                        logButton.style.cursor = "pointer";
                    }
                }
            }

            // Attach listeners to handle real-time typing and saved storage loading
            if (submitterInput) {
                submitterInput.addEventListener("input", validateSubmitterId);
            }

            // Run an initial check immediately in case the loaded localStorage already contains '|'
            validateSubmitterId();


            document.getElementById('coordHud').addEventListener('click', () => {
                if (map) {
                    const center = map.getCenter();
                    const googleMapsUrl = `https://www.google.com/maps/search/?api=1&query=${center.lat},${center.lng}`;
                    window.open(googleMapsUrl, '_blank');
                }
            });
            document.getElementById('mapCrosshair').addEventListener('click', () => {
                if (map && !document.getElementById('mapCrosshair').classList.contains('hidden')) {
                    const currentCenter = map.getCenter();
                    addRedLandmark([currentCenter.lat, currentCenter.lng]);
                }
            });
        });
        document.addEventListener('keydown', (e) => {
            if (e.key !== 'Tab') return;

            const form = e.target?.form;
            if (!form || !form.contains(e.target)) return;

            // only plain Shift+Tab navigation
            if (e.altKey || e.metaKey || e.ctrlKey) return;

            e.preventDefault();

            const focusables = [...form.querySelectorAll('input, select, textarea, button, [tabindex]:not([tabindex="-1"])')]
                .filter(el => !el.disabled && el.tabIndex >= 0 && el.offsetParent !== null);

            const i = focusables.indexOf(e.target);
            if (i === -1) return;

            const next = e.shiftKey ? focusables[i - 1] : focusables[i + 1];
            (next || (e.shiftKey ? focusables[focusables.length - 1] : focusables[0])).focus();
        });


        // functions in alphabetical order #Alpha
        function addRedLandmark(coords, savedCaption = '', shouldSave = true) {
            if (!map) return;

            const redIcon = new L.Icon.Default({
                className: 'red-marker-filter'
            });

            const marker = L.marker(coords, { icon: redIcon }).addTo(map);

            // Build the super compact horizontal inline wrapper
            const container = document.createElement('div');
            container.style.display = 'flex';
            container.style.alignItems = 'center';
            container.style.gap = '5px';

            // Caption Input Textbox (Centered Text)
            const input = document.createElement('input');
            input.type = 'text';
            input.placeholder = 'Caption...';
            input.style.width = '100px';
            input.style.height = '24px';
            input.style.fontSize = '12px';
            input.style.padding = '0 4px';
            input.style.border = '1px solid #2c2c2e';
            input.style.borderRadius = '4px';
            input.style.background = '#000000';
            input.style.color = '#ffffff';
            input.style.textAlign = 'center';

            input.value = savedCaption;

            // Track this landmark instance locally
            const landmarkEntry = { marker: marker, caption: savedCaption };
            localLandmarks.push(landmarkEntry);

            // Save state on input change
            input.addEventListener('input', (e) => {
                landmarkEntry.caption = e.target.value;
                saveLandmarksToStorage();

        function MEMSelected(qid, add, bLoad) {
            const key = 'selectedQids';
            const ledger = document.getElementById('ledgerOutput');
            if (bLoad) {
                if (!ledger) return;
                const raw = localStorage.getItem(key);
                let list = [];
                try {
                    list = raw ? JSON.parse(raw) : [];
                    if (!Array.isArray(list)) list = [];
                } catch {
                    list = [];
                }

                const selectedSet = new Set(list.map(String));

                const items = ledger.querySelectorAll(':scope > .log-item');
                items.forEach(el => {
                    const norm = QuestSDK.QSID(el.dataset.timestamp);
                    if (norm && selectedSet.has(norm)) el.classList.add('selected');
                    else el.classList.remove('selected');
                });

                return;
            }

            const normalized = QuestSDK.QSID(qid);
            if (!normalized) return;

            const raw = localStorage.getItem(key);
            let list = [];
            try {
                list = raw ? JSON.parse(raw) : [];
                if (!Array.isArray(list)) list = [];
            } catch {
                list = [];
            }

            const id = String(normalized);

            if (add) {
                if (!list.includes(id)) list.push(id);
            } else {
                list = list.filter(x => String(x) !== id);
            }

            localStorage.setItem(key, JSON.stringify(list));
        }

        function TimerStartStop(bStart, bStop) {
            // 20260706: Evelyn: Set the start time in UTC, but display the time in the user's local time.

            const btnStart = document.getElementById('MsgFormStartBtn');
            const txtStart = document.getElementById('MsgFormStartTime');
            const txtDura = document.getElementById('MsgFormDuration');
            const txtEnd = document.getElementById('MsgFormEndTime');
            const btnStop = document.getElementById('MsgFormStopBtn');
            const frmTimer = btnStart.closest('.timer-control');
            // Store UTC timestamps + accumulated duration (ms) on the element
            if (!frmTimer.dataset.accMs) frmTimer.dataset.accMs = "0";
            const started = frmTimer.classList.contains('started');

            if (bStart == bStop) {
                // Master Stop: if the Timer is started, stop it
                if (txtStart.value == "") { return; } // If the timer was not used, return;
                if (!started) { return; } // If the timer was used but currently stopped, return
                if (started) { bStop = false; } // If the timer is still running, stop it,
            }

            const pad2 = n => String(n).padStart(2, '0');
            const toLocalInputValueFromUTC = (utcMs) => {
                const d = new Date(utcMs);
                // Matches datetime-local input value format: YYYY-MM-DDTHH:mm
                return `${d.getFullYear()}${pad2(d.getMonth() + 1)}${pad2(d.getDate())}${pad2(d.getHours())}${pad2(d.getMinutes())}${pad2(d.getSeconds())}`;
            };
            const toLocalMinutes = (ms) => Math.max(0, ms / 60000);
            if (bStart) { // Start/pause button is pressed.
                if (!started) {
                    // If the started flag is not set, set the start time and the flag, change the text to pause.
                    frmTimer.classList.add('started');
                    frmTimer.dataset.startUtcMs = String(Date.now());
                    btnStart.textContent = 'PAUSE';
                    btnStop.textContent = 'CHECK';
                    // Display start time in local time only if it is new since reset
                    if (txtStart.value == "") {
                        frmTimer.dataset.startUtcMs0 = frmTimer.dataset.startUtcMs;
                        txtStart.value = toLocalInputValueFromUTC(Number(frmTimer.dataset.startUtcMs));
                    }
                } else {
                    // If the started flag is already set, pause, update the end time and accumulate the difference to the duration, display in minutes. Remove the started flag, change the text to start.
                    const nowUtcMs = Date.now();
                    frmTimer.dataset.endUtcMs = nowUtcMs
                    const startUtcMs = Number(frmTimer.dataset.startUtcMs || nowUtcMs);
                    const elapsedMs = Math.max(0, nowUtcMs - startUtcMs);
                    frmTimer.dataset.accMs = String(Number(frmTimer.dataset.accMs || 0) + elapsedMs);

                    // Display end time and accumulated duration (minutes)

                    if (txtEnd) txtEnd.value = toLocalInputValueFromUTC(nowUtcMs);
                    if (txtDura) txtDura.value = String(Math.ceil(toLocalMinutes(Number(frmTimer.dataset.accMs))));
                    frmTimer.classList.remove('started');
                    delete frmTimer.dataset.startUtcMs;
                    btnStart.textContent = 'START';
                    btnStop.textContent = 'RESET';
                }

            }
            if (bStop) { // Stop/Reset button is pressed.
                if (!started) {
                    // If the started flag is not set, clear the duration.
                    // Reset everything for a new run

                    frmTimer.classList.remove('started');
                    delete frmTimer.dataset.startUtcMs;
                    delete frmTimer.dataset.startUtcMs0;
                    delete frmTimer.dataset.endUtcMs;
                    delete frmTimer.dataset.accMs;


                    if (txtStart) txtStart.value = '';
                    if (txtEnd) txtEnd.value = '';
                    if (txtDura) txtDura.value = '';

                    btnStart.textContent = 'START';
                } else {
                    // If the started flag is set, update the end time and minute.
                    const nowUtcMs = Date.now();
                    if (txtEnd) txtEnd.value = toLocalInputValueFromUTC(nowUtcMs);
                    const startUtcMs = Number(frmTimer.dataset.startUtcMs || nowUtcMs);
                    var tempElapsedMs = Math.max(0, nowUtcMs - startUtcMs);
                    tempElapsedMs = String(Number(frmTimer.dataset.accMs || 0) + tempElapsedMs);
                    if (txtDura) txtDura.value = String(Math.ceil(toLocalMinutes(Number(tempElapsedMs))));

                }
            }
        }

            if (refreshBtn) {
                refreshBtn.disabled = true;
                refreshBtn.style.opacity = '0.25';
                    if (pendingDisplay.textContent === "0") {
                        pendingDisplay.parentElement.classList.add('hidden');
                    } else {
                        pendingDisplay.parentElement.classList.remove('hidden');
                    }


                    if (!iSpecificAPI) {
                        container.innerHTML = "";
                    }


                    if (result.data.length === 0 && !iSpecificAPI) {
                        container.innerHTML = "<p style='color:#a0aec0; font-size:12px;'>No public lines.</p>";
                        return;
                    }

                    result.data.forEach(item => {
                        // Parse and normalize tags
                        const tagString = item.tags ? item.tags.trim().toLowerCase() : '';
                        const tagList = tagString ? tagString.split(',').map(t => t.trim()) : [];

                        // Determine if this entry features *only* a sighting tag
                        const isOnlySighting = tagList.length === 1 && tagList[0] === 'sighting';

                        // Skip rendering this post if it's only a sighting and the setting is turned off
                        if (isOnlySighting && !allowSightingsInFeed) {
                            return; // Skip to next element
                        }

                        const element = document.createElement('div');
                        element.className = 'log-item';
                        element.classList.add(mScope);
                        element.style.position = 'relative';
                        element.style.overflow = 'hidden';

                        element.style.backgroundSize = 'cover';
                        element.style.backgroundPosition = 'center';

                        // Save the Quest ID
                        element.dataset.questId = item.questId;
                        element.dataset.timestamp = item.timestamp;
                        const hasCoords = item.latitude && item.longitude;
                        if (hasCoords) {
                            element.classList.add('geo')
                            element.dataset.latitude = item.latitude;
                            element.dataset.longitude = item.longitude;
                        }


                        // Start element content html
                        // Title
                        var htmlTags = EntryTagsHTML(item, element);
                        var html = `<div class="entry-titlebar" onclick="ToggleListComments(this);">`;
                        html += `<div style="float:right">`;
                        html += EntrySightingsShowHTML(element);
                        html += EntryGeoMarkHTML(element);

                        html += EntryQuickLogBtnHTML(element);
                        html += EntryTimestamp(item);
                        html += EntryDismissBtnHTML();
                        html += `</div>`;
                        html += EntryTitle(item);

                        html += " " + EntryStatus(item);
                        html += `</div><div class="entry-content hidden">`;
                        html += EntryThumbnail(item, "entry-thumbnail");
                        html += `<span style="float:right; color: #ffffff;">${item.submitterId || 'User'} ${EntryStandardButtons(item)}</span>`;
                        html += EntryParentButton(item);
                        html += htmlTags
                        html += `<div class="entry-text">${item.eventText} ${EntryURL(item)}</div>`;
                        html += `<span class="entry-childTags"></span>`;
                        html += `<div class="commentsSection hidden" style="clear:both; margin:5px -5px -5px -5px;"></div>`;

                        element.innerHTML = html;
                        container.append(element);
                    });
                }
            } catch (error) {
                console.error("Layout Compilation Error Log:", error);
                container.innerHTML = "<p style='color:#ff3b30; font-size:12px;'>Fetch Error.</p>";
            } finally {
                MEMSelected(null, null, true);
                filterMessageBoard();
                if (refreshBtn) {
                    refreshBtn.disabled = false;
                    refreshBtn.style.opacity = '';
                    refreshBtn.style.cursor = '';
                }
            }
        }
        document.getElementById('appVersion').textContent = APP_VERSION;

    </script>
</body>

</html>
